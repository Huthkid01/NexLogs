<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="google-site-verification" content="k5-d4tLbfJEf3MclG1yTfn0I9Sn0Gl_8dyPMgMErc04" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/images/nexlogs-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f26522" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0b0f14" media="(prefers-color-scheme: dark)" />
    <meta name="color-scheme" content="light dark" />
    <meta name="description" content="Nexlogs - Premium marketplace for verified social media accounts. Buy and sell Instagram, TikTok, YouTube, and more." />
    <meta name="keywords" content="social media accounts, marketplace, instagram, tiktok, youtube, buy accounts, nexlogs" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://www.nexlogs.store/" />
    <link rel="sitemap" type="application/xml" title="Sitemap" href="/sitemap.xml" />
    <meta property="og:title" content="Nexlogs - Social Media Marketplace" />
    <meta property="og:description" content="Premium marketplace for verified social media accounts" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.nexlogs.store/" />
    <meta property="og:site_name" content="Nexlogs" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Nexlogs - Social Media Marketplace" />
    <meta name="twitter:description" content="Premium marketplace for verified social media accounts" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      />
    </noscript>
    <title>Nexlogs - Social Media Marketplace</title>
    <script>
      (function () {
        var theme;
        try {
          theme = localStorage.getItem('nexlogs-theme');
        } catch (e) {
          theme = null;
        }
        if (
          theme === 'dark' ||
          (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)
        ) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
